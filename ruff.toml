# Конфиг ruff (тот же линтер, что в CI).
# CI проверяет только критичные ошибки (--select E9,F63,F7,F82); локально
# полезно гонять весь набор — этот файл убирает заведомо ложные срабатывания.

[lint.per-file-ignores]
