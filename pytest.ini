# Настройки pytest. Запуск: просто `pytest` из корня проекта.
[pytest]
testpaths = tests
pythonpath = .
addopts = -q -m "not balance"
markers =
    ui: тесты, которым нужен pygame (отрисовка экранов в headless-режиме)
    balance: МЕДЛЕННЫЙ регресс-гард баланса (~15с, прогон симуляций). Дефолтный
        прогон его пропускает; запуск: pytest -m balance
